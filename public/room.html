<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncRoom — Ver juntos</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .watch-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      z-index: 10;
    }
    .header-code {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 auto;
    }
    .header-code-val {
      font-family: var(--font-display);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
    }
    .header-avatars { display: flex; gap: -4px; }
    .header-avatars .avatar {
      width: 28px;
      height: 28px;
      border: 2px solid var(--color-surface);
      margin-left: -4px;
    }
    .header-avatars .avatar:first-child { margin-left: 0; }
    .watch-main { display: flex; flex: 1; overflow: hidden; }
    .player-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    #player-wrapper {
      flex: 1;
      background: #000;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #player-inner { width: 100%; height: 100%; }
    #player-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--color-text-muted);
      font-size: 0.875rem;
      z-index: 5;
    }
    .sync-badge-container {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
    }
    .side-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-tabs { display: flex; border-bottom: 1px solid var(--color-border); }
    .side-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: var(--transition);
      border-bottom: 2px solid transparent;
    }
    .side-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .tab-content { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .tab-content.active { display: flex; }
    .queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .queue-empty {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.8125rem;
      padding: 32px 16px;
    }
    .queue-add-btn {
      margin: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .queue-add-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-deep);
    }
    #tab-chat { background: var(--color-surface); }
    .bottom-chat {
      display: none;
      flex-direction: column;
      height: 280px;
      border-top: 1px solid var(--color-border);
      background: var(--color-surface);
    }
    @media (max-width: 768px) {
      .watch-main { flex-direction: column; }
      .side-panel { display: none; }
      .player-zone { flex: none; height: 56vw; min-height: 200px; }
      .bottom-chat { display: flex; }
      .watch-header { padding: 10px 16px; }
      .header-code-val { font-size: 0.8125rem; }
    }
    :fullscreen #player-wrapper, :-webkit-full-screen #player-wrapper { width: 100vw; height: 100vh; }
    :fullscreen .watch-header, :-webkit-full-screen .watch-header,
    :fullscreen .side-panel, :-webkit-full-screen .side-panel { display: none; }
    :fullscreen .player-zone, :-webkit-full-screen .player-zone { width: 100vw; height: 100vh; }
    .fs-chat {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 280px;
      height: 40vh;
      background: rgba(22, 22, 31, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      flex-direction: column;
      z-index: 50;
    }
    :fullscreen .fs-chat.visible { display: flex; }
    :-webkit-full-screen .fs-chat.visible { display: flex; }
    .fs-chat-toggle {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      z-index: 51;
      cursor: pointer;
    }
    :fullscreen .fs-chat-toggle { display: flex; }
    :-webkit-full-screen .fs-chat-toggle { display: flex; }
    :fullscreen .fs-chat.visible + .fs-chat-toggle,
    :-webkit-full-screen .fs-chat.visible + .fs-chat-toggle { display: none; }
    #player-controls { z-index: 10; }
    .ctrl-time { color: rgba(255,255,255,0.6); font-size: 0.8125rem; margin-left: auto; }
    .host-ctrl-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--color-text-muted);
      padding: 8px;
    }
    .add-yt-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 24px;
    }
    .add-yt-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 100%;
      max-width: 400px;
      animation: scaleIn 0.2s ease;
    }
    .participants-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px 6px;
      border-bottom: 1px solid var(--color-border);
    }
    .participant-mini {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <header class="watch-header">
    <a href="/" class="logo">
      <div class="logo-icon" style="width:26px;height:26px;border-radius:6px;">
        <svg viewBox="0 0 24 24" fill="white" style="width:12px;height:12px;">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <span class="logo-text" style="font-size:1rem;">Sync<span>Room</span></span>
    </a>
    <div class="header-code">
      <span class="header-code-val" id="header-code">---</span>
      <button class="copy-btn" style="padding:5px 10px;font-size:0.75rem;" onclick="copiarCodigo()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      </button>
    </div>
    <div class="header-avatars" id="header-avatars"></div>
  </header>

  <div class="watch-main" id="watch-container">

    <div class="player-zone">
      <div id="player-wrapper">
        <div id="player-inner" style="width:100%;height:100%;"></div>
        <div id="player-loading">
          <div class="spinner"></div>
          <span>Cargando video...</span>
        </div>
        <div class="sync-badge-container">
          <div class="sync-badge syncing" id="sync-badge">
            <div class="sync-dot"></div>
            <span id="sync-text">Sincronizando</span>
          </div>
        </div>
        <div class="player-controls" id="player-controls">
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="controls-row">
            <button class="ctrl-btn" id="ctrl-rewind" title="Retroceder 10s">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 3C7.81 3 4.37 6.35 3.15 10.5H1l4 4 4-4H6.31C7.43 6.55 9.73 5 12.5 5A7.5 7.5 0 1 1 5 12.5H3A9.5 9.5 0 1 0 12.5 3zm-1 5v5.25l4.5 2.67-.75 1.23L10 14V8h1.5z"/></svg>
            </button>
            <button class="ctrl-btn ctrl-btn-play" id="ctrl-play">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" id="ctrl-forward" title="Avanzar 10s">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 3A9.5 9.5 0 0 0 2 12.5H0l4 4 4-4H5.5A7.5 7.5 0 1 1 13 19.94V21.97A9.5 9.5 0 1 0 11.5 3zm.5 5h1.5v5.25l3.5 2.08-.75 1.23L12 14V8z"/></svg>
            </button>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:rgba(255,255,255,0.5);flex-shrink:0;">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <input type="range" class="volume-slider" id="vol-slider" min="0" max="100" value="80">
            <div class="ctrl-time" id="time-display">00:00 / 00:00</div>
            <button class="ctrl-btn" id="ctrl-fs" title="Pantalla completa">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
          <div id="host-note" style="display:none;" class="host-ctrl-note">
            Solo el host puede controlar el video
          </div>
        </div>
      </div>
    </div>

    <aside class="side-panel">
      <div class="side-tabs">
        <div class="side-tab active" id="tab-queue-btn" onclick="showTab('queue')">Cola</div>
        <div class="side-tab" id="tab-chat-btn" onclick="showTab('chat')">Chat</div>
      </div>
      <div class="tab-content active" id="tab-queue">
        <div class="participants-header">
          <div id="side-participants" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;"></div>
        </div>
        <div class="queue-list" id="queue-list">
          <div class="queue-empty">Sin videos en cola</div>
        </div>
        <div id="queue-add-area"></div>
      </div>
      <div class="tab-content" id="tab-chat" style="background:var(--color-surface);">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-container">
          <input type="text" class="chat-input" id="chat-input" placeholder="Escribe algo..." maxlength="300" autocomplete="off">
          <button class="chat-send-btn" id="chat-send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <div class="bottom-chat" id="bottom-chat">
      <div class="chat-messages" id="chat-messages-mobile"></div>
      <div class="chat-input-container">
        <input type="text" class="chat-input" id="chat-input-mobile" placeholder="Escribe algo..." maxlength="300" autocomplete="off">
        <button class="chat-send-btn" id="chat-send-mobile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <div class="fs-chat" id="fs-chat">
    <div class="chat-messages" id="chat-messages-fs" style="flex:1;overflow-y:auto;padding:12px;"></div>
    <div class="chat-input-container" style="padding:8px 12px;">
      <input type="text" class="chat-input" id="chat-input-fs" placeholder="Escribe algo..." style="font-size:0.8125rem;">
      <button class="chat-send-btn" id="chat-send-fs" style="width:32px;height:32px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <div class="fs-chat-toggle" id="fs-chat-toggle" onclick="toggleFsChat()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  </div>

  <div class="add-yt-modal" id="add-yt-modal" style="display:none;">
    <div class="add-yt-box">
      <h3 style="font-family:var(--font-display);font-size:1.1rem;margin-bottom:16px;">Agregar video de YouTube</h3>
      <input type="text" class="input-field" id="yt-room-input" placeholder="https://youtube.com/watch?v=...">
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="btn btn-ghost" onclick="cerrarYTModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="cargarYTDesdeRoom()">Cargar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/chat.js"></script>

  <script>
    fetch('/api/config').then(r => r.json()).then(cfg => {
      window.GOOGLE_CLIENT_ID = cfg.googleClientId;
      window.GOOGLE_API_KEY = cfg.googleApiKey;
      const s = document.createElement('script');
      s.src = '/js/drive.js';
      document.body.appendChild(s);
    });
  </script>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const userName = decodeURIComponent(params.get('u') || 'Anónimo');
    const isHost   = params.get('host') === '1';
    const roomCode = window.location.pathname.split('/')[2];
    const initVid  = params.get('vid');
    const initType = params.get('vtype') || 'drive';

    // Token de acceso a Drive (se llena cuando llega el room-state o video-change)
    let _roomDriveToken = '';

    document.getElementById('header-code').textContent = roomCode;
    document.title = `SyncRoom — ${roomCode}`;

    const videoQueue = [];
    let activeVideoIndex = -1;
    const partsMap = {};

    function showTab(tab) {
      document.getElementById('tab-queue').classList.toggle('active', tab === 'queue');
      document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
      document.getElementById('tab-queue-btn').classList.toggle('active', tab === 'queue');
      document.getElementById('tab-chat-btn').classList.toggle('active', tab === 'chat');
    }

    function updateSyncBadge(synced) {
      const badge = document.getElementById('sync-badge');
      const text  = document.getElementById('sync-text');
      badge.className = `sync-badge ${synced ? 'synced' : 'syncing'}`;
      text.textContent = synced ? 'Sincronizados' : 'Sincronizando';
    }

    const chat = initChat('chat-messages', 'chat-input', 'chat-send', userName);
    const chatMobile = initChat('chat-messages-mobile', 'chat-input-mobile', 'chat-send-mobile', userName);
    const chatFs = initChat('chat-messages-fs', 'chat-input-fs', 'chat-send-fs', userName);

    const origAdd = chat.addMessage.bind(chat);
    chat.addMessage = function(data) {
      origAdd(data);
      chatMobile.addMessage(data);
      chatFs.addMessage(data);
    };

    const origSys = chat.addSystemMessage.bind(chat);
    chat.addSystemMessage = function(text) {
      origSys(text);
      chatMobile.addSystemMessage(text);
      chatFs.addSystemMessage(text);
    };

    function agregarParticipante(name, avatarSeed, esHost) {
      if (partsMap[name]) return;
      partsMap[name] = { name, avatarSeed, esHost };
      renderHeaderAvatars();
      renderSideParticipants();
    }

    function quitarParticipante(name) {
      delete partsMap[name];
      renderHeaderAvatars();
      renderSideParticipants();
    }

    function renderHeaderAvatars() {
      const container = document.getElementById('header-avatars');
      container.innerHTML = '';
      Object.values(partsMap).forEach(p => {
        const wrap = document.createElement('div');
        wrap.className = 'avatar';
        wrap.style.cssText = 'width:28px;height:28px;border:2px solid var(--color-surface);margin-left:-4px;';
        wrap.innerHTML = `<img src="${getAvatarUrl(p.name)}" alt="${p.name}" width="28" height="28" title="${p.name}${p.esHost ? ' (host)' : ''}">`;
        container.appendChild(wrap);
      });
    }

    function renderSideParticipants() {
      const container = document.getElementById('side-participants');
      container.innerHTML = '';
      Object.values(partsMap).forEach(p => {
        const div = document.createElement('div');
        div.className = 'participant-mini';
        div.innerHTML = `
          <div class="avatar" style="width:24px;height:24px;">
            <img src="${getAvatarUrl(p.name)}" alt="${p.name}" width="24" height="24">
          </div>
          <span>${p.name}</span>
          ${p.esHost ? '<span class="badge badge-host" style="font-size:0.5625rem;">H</span>' : ''}
          <div class="online-dot" style="width:6px;height:6px;"></div>
        `;
        container.appendChild(div);
      });
    }

    agregarParticipante(userName, userName.toLowerCase(), isHost);

    function agregarAQueue(videoId, videoType, nombre) {
      videoQueue.push({ videoId, videoType, nombre: nombre || videoId });
      renderQueue();
    }

    function renderQueue() {
      const list = document.getElementById('queue-list');
      list.innerHTML = '';
      if (videoQueue.length === 0) {
        list.innerHTML = '<div class="queue-empty">Sin videos en cola</div>';
        return;
      }
      videoQueue.forEach((v, i) => {
        const item = document.createElement('div');
        item.className = `queue-item${i === activeVideoIndex ? ' active' : ''}`;
        item.innerHTML = `
          <div class="queue-thumb">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--color-text-muted)"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
          </div>
          <div class="queue-name">${v.nombre}</div>
          ${v.videoType === 'youtube' ? '<span style="font-size:0.625rem;color:#FF0000;font-weight:600;">YT</span>' : ''}
        `;
        if (isHost) {
          item.addEventListener('click', () => { emitVideoChange(v.videoId, v.videoType); });
        }
        list.appendChild(item);
      });
    }

    const queueAddArea = document.getElementById('queue-add-area');
    if (isHost) {
      queueAddArea.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:6px;padding:8px 12px 12px;">
          <button class="queue-add-btn" onclick="openDrivePicker()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            Agregar desde Drive
          </button>
          <button class="queue-add-btn" onclick="abrirYTModal()" style="border-color:rgba(255,0,0,0.3);color:#FF0000;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            + YouTube
          </button>
        </div>
      `;
    }

    if (!isHost) {
      document.getElementById('host-note').style.display = 'block';
    }

    initPlayer({
      isHost,
      onPlay:  (t) => { emitPlay(t);  updateSyncBadge(true); },
      onPause: (t) => { emitPause(t); },
      onSeek:  (t) => { emitSeek(t);  },
      onSyncUpdate: updateSyncBadge
    });

    if (initVid) {
      agregarAQueue(initVid, initType, initVid);
      activeVideoIndex = 0;
      renderQueue();
      if (initType === 'youtube') {
        loadYouTubeVideo(initVid);
      } else {
        // Token llega via room-state; esperar brevemente
        setTimeout(() => loadDriveVideo(initVid, _roomDriveToken), 600);
      }
    }

    // ✅ CAMBIO: usa state.guests (array) en lugar de state.guest
    initSocket({
      roomCode, userName, avatarSeed: userName.toLowerCase(), isHost,
      onRoomState(state) {
        if (state.host) agregarParticipante(state.host.userName, state.host.avatarSeed, true);
        if (state.guests) {
          state.guests.forEach(g => agregarParticipante(g.userName, g.avatarSeed, false));
        }
        if (state.accessToken) _roomDriveToken = state.accessToken;
        if (state.video && !initVid) {
          cargarVideoDesdeSocket(state.video, state.videoType, state.accessToken);
          if (state.playing) {
            setTimeout(() => { onRemotePlay({ currentTime: state.currentTime }); updateSyncBadge(true); }, 1500);
          }
        }
      },
      onUserJoined(data) {
        agregarParticipante(data.userName, data.avatarSeed, data.isHost);
        chat.addSystemMessage(`${data.userName} se unió a la sala`);
        showToast(`🌟 ${data.userName} se unió`, 'success');
      },
      onUserLeft(data) {
        quitarParticipante(data.userName);
        chat.addSystemMessage(`${data.userName} salió de la sala`);
        showToast(`${data.userName} salió de la sala`, 'info');
      },
      onHostLeft(data) {
        chat.addSystemMessage(`${data.userName} (host) se desconectó`);
        showToast('⚠️ El host se desconectó — sala pausada', 'error', 5000);
        pauseVideo();
      },
      onSystemMessage(msg) {},
      onChatMessage(data) { chat.addMessage(data); },
      onVideoPlay(data) { onRemotePlay(data); updateSyncBadge(true); },
      onVideoPause(data) { onRemotePause(data); },
      onVideoSeek(data) { onRemoteSeek(data); },
      onVideoChange(data) {
        cargarVideoDesdeSocket(data.videoId, data.videoType, data.accessToken);
        agregarAQueue(data.videoId, data.videoType, data.videoId);
        activeVideoIndex = videoQueue.length - 1;
        renderQueue();
      },
      onSyncResponse(data) { applySyncResponse(data); }
    });

    function cargarVideoDesdeSocket(videoId, videoType, accessToken) {
      if (accessToken) _roomDriveToken = accessToken;
      if (videoType === 'youtube') {
        loadYouTubeVideo(videoId);
      } else {
        loadDriveVideo(videoId, _roomDriveToken);
      }
    }

    initGooglePicker(({ fileId, fileName, accessToken }) => {
      showToast(`🎬 Cargando "${fileName}"...`, 'info');
      if (accessToken) _roomDriveToken = accessToken;
      emitVideoChange(fileId, 'drive', accessToken);
      agregarAQueue(fileId, 'drive', fileName);
      activeVideoIndex = videoQueue.length - 1;
      renderQueue();
      loadDriveVideo(fileId, accessToken);
    });

    function abrirYTModal() { document.getElementById('add-yt-modal').style.display = 'flex'; }
    function cerrarYTModal() { document.getElementById('add-yt-modal').style.display = 'none'; }

    function cargarYTDesdeRoom() {
      const url = document.getElementById('yt-room-input').value.trim();
      const videoId = parseYouTubeId(url);
      if (!videoId) { showToast('URL inválida', 'error'); return; }
      cerrarYTModal();
      emitVideoChange(videoId, 'youtube');
      agregarAQueue(videoId, 'youtube', url);
      activeVideoIndex = videoQueue.length - 1;
      renderQueue();
      loadYouTubeVideo(videoId);
    }

    function copiarCodigo() {
      navigator.clipboard.writeText(roomCode).then(() => showToast('📋 Código copiado', 'info'));
    }

    function toggleFsChat() {
      const chat = document.getElementById('fs-chat');
      chat.classList.toggle('visible');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        cerrarYTModal();
        document.getElementById('fs-chat').classList.remove('visible');
      }
    });
  </script>
</body>
</html>
